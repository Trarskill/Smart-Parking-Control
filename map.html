    <style type="text/tailwindcss">
        @layer components {
            /* Клас для навігаційних посилань */
            .nav-link {
                @apply text-graphite-dark hover:text-graphite-dark-blue transition-colors;
            }
            .nav-link-active {
                @apply text-graphite-dark-blue border-b-2 border-mint pb-1;
            }

            /* Базовий контейнер паркомісця (всі структурні налаштування) */
            .spot-card-free {
                @apply flex flex-col items-center w-fit h-fit bg-graphite-very-light border-mint-dark border-4 rounded-[2px] overflow-hidden;
            }
            
            .spot-card-occupied {
                @apply flex flex-col items-center w-fit h-fit bg-graphite-very-light border-graphite-dark border-4 rounded-[2px] overflow-hidden;
            }
            /* Блок із текстом */
            .spot-label {
                @apply w-fit h-fit text-body text-graphite-dark-blue py-0.5;
            }
            
            /* Контейнер для картинки */
            .spot-img-wrapper {
                @apply w-full h-fit border-t-4 flex justify-center;
            }
            
            /* Сама картинка */
            .spot-img {
                @apply w-full object-cover;
            }
        }
    </style>
</head>

    <div id="settings-modal" class="fixed inset-0 bg-graphite-dark-blue/50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-lg p-6 w-[90%] max-w-[400px]">
            <h2 class="text-xl font-bold text-graphite-dark-blue mb-4">Налаштування системи</h2>
            <form id="settings-form" class="flex flex-col gap-4">
                <div>
                    <label class="block text-sm text-graphite-dark mb-1">Кількість місць парковки (10-99):</label>
                    <input type="number" id="setting-total-spots" min="10" max="99" class="w-full border border-graphite-light rounded px-3 py-2 text-graphite-dark-blue outline-none focus:border-mint-dark" required>
                </div>
                <div>
                    <label class="block text-sm text-graphite-dark mb-1">Швидкість симуляції (сек):</label>
                    <input type="number" id="setting-sim-speed" min="2" max="60" class="w-full border border-graphite-light rounded px-3 py-2 text-graphite-dark-blue outline-none focus:border-mint-dark" required>
                </div>
                <div id="settings-msg" class="text-sm font-medium hidden text-center"></div>
                
                <div class="flex justify-end gap-2 mt-4">
                    <button type="button" id="close-settings-btn" class="px-4 py-2 rounded border border-graphite-light text-graphite-dark hover:bg-graphite-very-light transition-colors">Скасувати</button>
                    <button type="submit" class="px-4 py-2 rounded bg-mint-dark text-white font-bold hover:bg-mint-very-dark transition-colors">Save</button>
                </div>
            </form>
